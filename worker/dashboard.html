<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker · Hardwork Elite · GOLD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: #0b0a07; /* richer dark base */
            color: #f0e7d9;
            padding: 28px 30px;
            min-height: 100vh;
            position: relative;
        }

        /* subtle golden weave overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, rgba(251, 191, 36, 0.02) 0px, rgba(251, 191, 36, 0.02) 3px, transparent 3px, transparent 10px),
                radial-gradient(circle at 80% 20%, rgba(251, 191, 36, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 34px;
            background: #13110d;
            border: 1px solid #fbbf24;
            border-radius: 60px;
            box-shadow: 0 20px 30px -12px #fbbf2440, 0 0 0 1px #fcd34d inset, 0 0 18px #fbbf2460;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(145deg, #fde68a, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 16px #fbbf24, 0 2px 4px #00000050;
            letter-spacing: -0.5px;
        }

        .header .badge {
            background: #fbbf24;
            color: #0a0804;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 1px solid #ffdb9d;
            box-shadow: 0 0 16px #fbbf24, 0 4px 0 #b45309;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid #fbbf24;
            color: #fcd34d;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px #fbbf2440;
        }

        .logout-btn:hover {
            background: #fbbf24;
            color: #0a0804;
            box-shadow: 0 0 30px #fbbf24, 0 6px 0 #b45309;
            border-color: #fff2d0;
            transform: translateY(-2px);
        }

        .worker-info {
            background: #15120d;
            border-left: 6px solid #fbbf24;
            padding: 18px 28px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 18px #00000060, 0 0 0 1px #fbbf2440;
        }

        .worker-info p {
            font-size: 1.25rem;
            color: #e7d6bb;
        }

        .worker-info strong {
            color: #fcd34d;
            font-weight: 700;
            text-shadow: 0 0 5px #fbbf24;
        }

        .earnings-panel {
            background: #15120d;
            border: 1px solid #fbbf24;
            border-radius: 48px;
            padding: 32px 38px;
            margin-bottom: 50px;
            box-shadow: 0 25px 35px -14px #fbbf2480, inset 0 0 30px #fbbf2420, 0 0 0 1px #fcd34d inset;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .earnings-stats {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: left;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #c9a76b;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2.8rem;
            font-weight: 800;
            color: #fde68a;
            text-shadow: 0 0 25px #fbbf24, 2px 2px 0 #92400e;
            line-height: 1.2;
        }

        .stat-value small {
            font-size: 1rem;
            color: #b88b40;
            text-shadow: none;
        }

        .earnings-action {
            display: flex;
            gap: 20px;
        }

        .elite-btn {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border: none;
            color: #0a0804;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 15px 38px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #b45309, 0 12px 28px #fbbf24b0;
            transition: 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid #fde68a;
        }

        .elite-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #b45309, 0 20px 35px #fbbf24;
            background: linear-gradient(145deg, #fcd34d, #fbbf24);
        }

        .elite-btn.secondary {
            background: #201d17;
            color: #fde68a;
            box-shadow: 0 7px 0 #7b571e, 0 10px 25px #fbbf2440;
            border-color: #fbbf24;
        }

        .elite-btn.secondary:hover {
            background: #2f2a1f;
            color: #ffefcf;
            box-shadow: 0 9px 0 #7b571e, 0 15px 30px #fbbf24;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 500;
            margin: 45px 0 25px 0;
            border-left: 8px solid #fbbf24;
            padding-left: 20px;
            color: #fdebb3;
            text-shadow: 0 0 8px #fbbf24;
            letter-spacing: -0.02em;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 28px;
            margin-bottom: 30px;
        }

        .job-card {
            background: #15120d;
            border: 1px solid #fbbf2460;
            border-radius: 32px;
            padding: 26px;
            box-shadow: 0 16px 28px -12px #000000e0, 0 0 0 1px #fbbf2420 inset;
            transition: all 0.2s;
            position: relative;
            backdrop-filter: blur(2px);
        }

        .job-card:hover {
            transform: scale(1.02) translateY(-3px);
            border-color: #fbbf24;
            box-shadow: 0 24px 34px -10px #fbbf24, 0 0 0 1px #fde68a inset;
        }

        .job-card.accepted-taken {
            opacity: 0.9;
            background: #201e18;
            border-color: #fbbf2480;
        }
        .job-card.accepted-taken::after {
            content: "⏳ TAKEN";
            position: absolute;
            top: 14px;
            right: 14px;
            background: #fbbf24;
            color: #0a0804;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid #ffeaaf;
            box-shadow: 0 0 12px gold;
        }

        .job-card p {
            margin: 8px 0;
            color: #e0cfb5;
            font-weight: 400;
        }

        .job-card strong {
            color: #fcd34d;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            background: #2b241b;
            color: #fbbf24;
            border: 1px solid #fbbf24;
            box-shadow: 0 0 6px #fbbf24;
        }

        .job-actions {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .job-actions button, .job-actions a {
            background: #fbbf24;
            color: #0a0804;
            border: none;
            padding: 10px 26px;
            border-radius: 36px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            border: 1px solid #ffe8b5;
            transition: 0.1s;
            box-shadow: 0 5px 0 #b45309, 0 6px 14px #fbbf2480;
            text-transform: uppercase;
        }

        .job-actions button:hover, .job-actions a:hover {
            background: #fcd34d;
            transform: translateY(-3px);
            box-shadow: 0 7px 0 #b45309, 0 10px 20px #fbbf24;
        }

        .empty-message {
            background: #15120d;
            border: 1px dashed #fbbf2480;
            border-radius: 32px;
            padding: 42px;
            text-align: center;
            color: #b59867;
            font-style: italic;
            font-size: 1.2rem;
            box-shadow: 0 0 20px #00000080;
        }

        footer {
            margin-top: 60px;
            text-align: right;
            color: #8f7b5a;
            font-size: 0.85rem;
            border-top: 1px solid #fbbf2440;
            padding-top: 22px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.95rem;
            color: #d4bc94;
        }
        .detail-row i {
            color: #fbbf24;
            font-style: normal;
            filter: drop-shadow(0 0 4px #fbbf24);
        }

        /* extra golden spark */
        .job-card .detail-row i::before {
            content: "✨";
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1>⚒️ WORKER ELITE</h1>
            <span class="badge">HARDWORK · GOLD</span>
        </div>
        <button class="logout-btn" id="logoutBtn">SIGN OUT</button>
    </div>

    <div class="worker-info" id="workerInfo"></div>

    <div class="earnings-panel">
        <div class="earnings-stats">
            <div class="stat-item">
                <div class="stat-label">Available for Payout</div>
                <div class="stat-value" id="availableEarnings">₹0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Approved</div>
                <div class="stat-value" id="totalApproved">₹0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Pending (user)</div>
                <div class="stat-value" id="pendingUser">₹0</div>
            </div>
        </div>
        <div class="earnings-action">
            <button class="elite-btn" onclick="window.location.href='earnings.html'">💰 VIEW EARNINGS</button>
            <button class="elite-btn secondary" onclick="requestPayout()">📤 REQUEST PAYOUT</button>
        </div>
    </div>

    <h2 class="section-title">⏳ PENDING BOOKINGS</h2>
    <div class="cards-grid" id="pendingBookings"></div>

    <h2 class="section-title">🔨 ACTIVE JOBS</h2>
    <div class="cards-grid" id="activeJobs"></div>

    <footer>
        <span id="timestamp"></span> · every shift counts · golden standard
    </footer>

    <script>
        (function() {
            const API = "http://localhost:5000/api";

            const currentWorker = JSON.parse(localStorage.getItem('currentWorker'));
            if (!currentWorker) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('workerInfo').innerHTML = `
                <p><strong>${currentWorker.name || currentWorker.email}</strong> · Worker</p>
            `;

            async function loadData() {
                try {
                    const [bookingsRes, paymentsRes] = await Promise.all([
                        fetch(API + "/bookings/worker/" + currentWorker.id),
                        fetch(API + "/admin/payments")
                    ]);

                    const bookings = await bookingsRes.json();
                    const allPayments = await paymentsRes.json();

                    const workerPayments = (allPayments || []).filter(p => p.worker_id === currentWorker.id);

                    let available = 0, approved = 0, pendingUser = 0;
                    workerPayments.forEach(p => {
                        const amt = Number(p.amount) || 0;
                        if (p.status === 'paid_by_user') available += amt;
                        else if (p.status === 'approved') approved += amt;
                        else if (p.status === 'pending') pendingUser += amt;
                    });

                    document.getElementById('availableEarnings').innerText = `₹${available}`;
                    document.getElementById('totalApproved').innerText = `₹${approved}`;
                    document.getElementById('pendingUser').innerText = `₹${pendingUser}`;

                    const pendingB = (bookings || []).filter(b => b.status === 'pending');
                    const activeB = (bookings || []).filter(b => b.status !== 'pending' && b.status !== 'completed');

                    renderPending(pendingB);
                    renderActive(activeB);

                    window.requestPayout = function() {
                        if (available === 0) {
                            alert('No funds available for payout.');
                            return;
                        }
                        alert(`✨ Payout request of ₹${available} noted (hook to backend if needed).`);
                    };
                } catch (err) {
                    console.error("Worker dashboard load error", err);
                }
            }

            function renderPending(pendingB) {
                const pendingDiv = document.getElementById('pendingBookings');
                if (!pendingB || pendingB.length === 0) {
                    pendingDiv.innerHTML = '<div class="empty-message">✨ No pending bookings — ready to shine</div>';
                    return;
                }
                pendingDiv.innerHTML = pendingB.map(b => `
                    <div class="job-card">
                        <p><strong>Booking #${b.id}</strong></p>
                        <p>👤 User: ${b.user_id}</p>
                        <p>⏱️ Created: ${b.created_at ? b.created_at.slice(0,10) : '—'}</p>
                        <div class="job-actions">
                            <button onclick="acceptJob('${b.id}')">✅ Accept</button>
                        </div>
                    </div>
                `).join('');
            }

            function renderActive(activeB) {
                const activeDiv = document.getElementById('activeJobs');
                if (!activeB || activeB.length === 0) {
                    activeDiv.innerHTML = '<div class="empty-message">⚡ No active jobs — go get them</div>';
                    return;
                }
                activeDiv.innerHTML = activeB.map(b => {
                    const extraClass = b.status === 'accepted' ? 'accepted-taken' : '';
                    return `
                        <div class="job-card ${extraClass}">
                            <p><strong>Booking #${b.id}</strong></p>
                            <p>👤 User: ${b.user_id}</p>
                            <p>📌 Status: <span class="badge">${(b.status || '').replace(/_/g, ' ')}</span></p>
                            <div class="job-actions">
                                <a href="job-details.html?bookingId=${b.id}">🔧 Update Status</a>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.acceptJob = async function(bookingId) {
                try {
                    const res = await fetch(API + "/bookings/" + bookingId + "/status", {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ status: "accepted" })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        alert(data.message || "Failed to accept job");
                        return;
                    }
                    alert('✅ Job accepted! Golden opportunity.');
                    loadData();
                } catch (err) {
                    alert("Server error");
                }
            };

            document.getElementById('timestamp').innerText = new Date().toLocaleString();

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('currentWorker');
                window.location.href = '../index.html';
            });

            loadData();
        })();
    </script>
</body>
</html>
