<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details · Elite Gold Neon</title>
    <!-- modern font for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 30% 10%, #1a1500, #000000 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: #f5e7c8;
        }

        /* main card – black gold neon */
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 8, 3, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.35);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px -10px #000, 
                        0 0 0 1px rgba(255, 215, 0, 0.2) inset,
                        0 0 40px #ffd70030;
            transition: box-shadow 0.3s ease, border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.7);
            box-shadow: 0 30px 60px -8px #000, 
                        0 0 0 1px rgba(255, 223, 0, 0.5) inset,
                        0 0 50px #ffd90060;
        }

        h2 {
            font-size: 2.3rem;
            font-weight: 600;
            background: linear-gradient(145deg, #ffe68f, #ffb347, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 0 12px #ffbf00);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h2::after {
            content: "⚜️";
            font-size: 2rem;
            filter: drop-shadow(0 0 6px gold);
        }

        /* job info area – elevated */
        #jobInfo {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ffd96660;
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px #ffd70020, inset 0 0 10px #000000;
            backdrop-filter: blur(5px);
        }

        #jobInfo p {
            font-size: 1.15rem;
            margin: 0.5rem 0;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        #jobInfo strong {
            font-weight: 600;
            color: #ffdb8e;
            text-shadow: 0 0 6px #ffb300;
            min-width: 120px;
        }

        #currentStatus {
            display: inline-block;
            background: linear-gradient(135deg, #2f2a1a, #1f1a0c);
            padding: 0.3rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #ffd966;
            border: 1px solid #f5c542;
            box-shadow: 0 0 15px #ffbf40, inset 0 0 6px #ffffb0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* control section */
        #statusControls {
            margin: 2rem 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* gold neon button style */
        button {
            background: transparent;
            border: 2px solid #ffd966;
            color: #ffdfaa;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 15px #ffb300, 0 4px 10px rgba(0,0,0,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s ease;
            backdrop-filter: blur(4px);
            background: rgba(0,0,0,0.5);
            width: fit-content;
            min-width: 200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: #ffd966;
            color: #0a0802;
            border-color: #ffea9e;
            box-shadow: 0 0 30px #ffaa00, 0 8px 18px black;
            transform: scale(1.04) translateY(-2px);
            font-weight: 700;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 0 40px #ffaa00;
        }

        /* special style for back button (inline) */
        button:last-of-type {
            background: rgba(0,0,0,0.7);
            border-color: #b2975a;
            box-shadow: 0 0 12px #996633;
        }

        button:last-of-type:hover {
            background: #b28b40;
            border-color: #ffdb8b;
            color: black;
        }

        /* input field – neon gold */
        input[type="text"] {
            background: #141108;
            border: 2px solid #c9a34b;
            border-radius: 3rem;
            padding: 1rem 1.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            color: #ffdcaa;
            outline: none;
            width: 100%;
            box-shadow: 0 0 15px #cc9900, inset 0 0 8px #332811;
            transition: 0.2s;
            margin: 0.5rem 0 1rem;
        }

        input[type="text"]:focus {
            border-color: #ffbf00;
            box-shadow: 0 0 30px #ffaa33, inset 0 0 12px #ffd966;
            background: #1c170a;
            color: #fff2d2;
        }

        input[type="text"]::placeholder {
            color: #ad9f70;
            font-weight: 300;
            opacity: 0.7;
        }

        /* subtle glow for otp section */
        #statusControls p {
            color: #ffdb8b;
            text-shadow: 0 0 4px #ffb347;
            font-weight: 500;
            margin: 0.5rem 0;
        }

        /* back button container adjustment */
        .card > button:last-child {
            margin-top: 1rem;
            width: auto;
            min-width: 150px;
        }

        /* responsive */
        @media (max-width: 450px) {
            .card {
                padding: 2rem 1.2rem;
            }
            h2 {
                font-size: 1.9rem;
            }
            button {
                min-width: 160px;
                font-size: 1rem;
            }
        }

        /* gold neon glow animation for status */
        @keyframes goldPulse {
            0% { box-shadow: 0 0 5px #ffbf00, 0 0 10px #ffbf00; }
            50% { box-shadow: 0 0 20px #ffaa00, 0 0 40px #ffaa00; }
            100% { box-shadow: 0 0 5px #ffbf00, 0 0 10px #ffbf00; }
        }

        #currentStatus {
            animation: goldPulse 3s infinite;
        }

        /* extra elite touch – glitter overlay */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: inherit;
            background: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.1) 0%, transparent 60%);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Job Status</h2>
        <div id="jobInfo"></div>
        <div id="statusControls"></div>
        <button onclick="goBack()">Back</button>
    </div>

    <script>
        // Original functionality fully preserved – only UI is enhanced
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = parseInt(urlParams.get('bookingId'));
        const currentWorker = JSON.parse(localStorage.getItem('currentWorker'));

        if (!currentWorker) window.location.href = 'login.html';

        // Function to get latest booking
        function getBooking() {
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            return bookings.find(b => b.id === bookingId);
        }

        let booking = getBooking();
        if (!booking || booking.workerId !== currentWorker.id) {
            alert('Invalid job');
            window.location.href = 'dashboard.html';
        }

        function render() {
            booking = getBooking(); // refresh
            document.getElementById('jobInfo').innerHTML = `
                <p><strong>Booking ID:</strong> ${booking.id}</p>
                <p><strong>Current Status:</strong> <span id="currentStatus">${booking.status}</span></p>
            `;
            updateControls();
        }

        function updateControls() {
            const status = booking.status;
            let html = '';
            if (status === 'accepted') {
                html = '<button onclick="updateStatus(\'on_the_way\')">🚀 On the Way</button>';
            } else if (status === 'on_the_way') {
                html = '<button onclick="updateStatus(\'near\')">📍 Near</button>';
            } else if (status === 'near') {
                html = '<button onclick="updateStatus(\'arrived\')">🏁 Arrived</button>';
            } else if (status === 'arrived') {
                html = `
                    <p>🔑 Enter OTP from user:</p>
                    <input type="text" id="otpInput" placeholder="golden code">
                    <button onclick="verifyOtp()">✨ Verify & Start Work</button>
                `;
            } else if (status === 'in_progress') {
                html = '<button onclick="updateStatus(\'completed\')">✅ Mark Complete</button>';
            }
            document.getElementById('statusControls').innerHTML = html;
        }

        window.updateStatus = function(newStatus) {
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const index = bookings.findIndex(b => b.id === bookingId);
            if (index !== -1) {
                bookings[index].status = newStatus;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                booking = bookings[index];
                document.getElementById('currentStatus').innerText = newStatus;
                updateControls();

                if (newStatus === 'completed') {
                    // Auto create payment request to special admin
                    const payments = JSON.parse(localStorage.getItem('payments') || '[]');
                    payments.push({
                        id: Date.now(),
                        bookingId: booking.id,
                        workerId: currentWorker.id,
                        userId: booking.userId,
                        amount: 200,
                        status: 'pending',
                        type: 'worker_payment'
                    });
                    localStorage.setItem('payments', JSON.stringify(payments));
                    alert('✨ Work completed. Payment request sent to Special Admin.');
                }
            }
        };

        window.verifyOtp = function() {
            const enteredOtp = document.getElementById('otpInput').value;
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const currentBooking = bookings.find(b => b.id === bookingId);
            if (!currentBooking) return;

            if (!currentBooking.otp) {
                alert('⏳ OTP not generated by user yet. Please wait for user to generate OTP.');
                return;
            }
            if (enteredOtp === currentBooking.otp) {
                currentBooking.status = 'in_progress';
                localStorage.setItem('bookings', JSON.stringify(bookings));
                booking = currentBooking;
                document.getElementById('currentStatus').innerText = 'in_progress';
                updateControls();
                alert('🔓 OTP verified. Work started.');
            } else {
                alert('❌ Invalid OTP');
            }
        };

        function goBack() { window.location.href = 'dashboard.html'; }

        render();
        // Auto-refresh every 3 seconds to detect OTP generation
        setInterval(render, 3000);
    </script>
</body>
</html>
