<!DOCTYPE html>
<html lang="en">
<head>
    <title>Worker Login | Servisphere</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f7faff, #eaf4ff);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 35px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.15);
            animation: fadeIn 0.7s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #007bff;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #d0e2ff;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input::placeholder {
            color: #8aa8d8;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.25);
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #007bff, #00bfff);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.35);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 123, 255, 0.45);
        }

        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Worker Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            New worker?
            <a href="signup.html">Signup</a>
            <br><br>
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const workers = JSON.parse(localStorage.getItem('workers') || '[]');
            const worker = workers.find(
                w => w.email === email && w.password === password
            );

            if (worker) {
                localStorage.setItem('currentWorker', JSON.stringify(worker));
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials');
            }
        };
    </script>
</body>
</html>
