<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earnings · Worker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #c1e3fe 0%, #a3d0fa 100%);
            min-height: 100vh;
            padding: 30px 25px;
            color: #023b6d;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            padding: 20px 30px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(1, 85, 162, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #02457a;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
        }

        .logout-btn {
            background: #02457a;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 12px #022b4a;
            transition: 0.2s;
            border: 1px solid #91c8ff;
        }

        .logout-btn:hover {
            background: #01345e;
            transform: scale(1.02);
            box-shadow: 0 6px 16px #011b30;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px 20px;
            border: 1px solid white;
            box-shadow: 0 12px 25px rgba(0, 70, 150, 0.15);
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #02529c;
            font-weight: 600;
        }

        .stat-value {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            color: #003057;
            text-shadow: 0 2px 5px white;
        }

        .stat-unit {
            font-size: 1rem;
            color: #014282;
        }

        .action-panel {
            background: white;
            border-radius: 36px;
            padding: 28px 30px;
            margin: 35px 0;
            box-shadow: 0 15px 30px rgba(1, 63, 128, 0.25);
            border: 1px solid #b5dcff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .action-panel h3 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #01539e;
        }

        .request-btn {
            background: #02457a;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #001e35, 0 8px 20px #0284c7;
            transition: 0.1s ease;
            border: 1px solid #7bc3ff;
        }

        .request-btn:hover {
            background: #013b68;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #001e35, 0 12px 25px #0277bd;
        }

        .request-btn:disabled {
            background: #b0c4de;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            border-color: #9bb7d6;
            color: #eef5ff;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px #7bb9e6;
        }

        .history-card h2 {
            font-size: 1.8rem;
            color: #00315e;
            margin-bottom: 15px;
            border-left: 8px solid #024e9f;
            padding-left: 20px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #01254a;
        }

        th {
            background: #bed9ff;
            color: #002856;
            font-weight: 600;
            text-transform: uppercase;
            padding: 16px 12px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 2px solid #3b8fd9;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #b1d1f0;
            background: rgba(255, 255, 255, 0.7);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            background: #e1efff;
            color: #004e9e;
            border: 1px solid #0284c7;
        }

        .badge-approved {
            background: #bff0d4;
            color: #006b3d;
            border-color: #00a86b;
        }

        .badge-paid_by_user {
            background: #cfe2ff;
            color: #0142a3;
            border-color: #1e6df2;
        }

        .badge-pending {
            background: #ffecbb;
            color: #a36000;
            border-color: #ffae42;
        }

        .empty-msg {
            text-align: center;
            padding: 30px;
            color: #015a9c;
            font-style: italic;
            background: rgba(255, 255, 255, 0.5);
        }

        footer {
            margin-top: 30px;
            text-align: right;
            color: #014282;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>💸 My Earnings</h1>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Approved</div>
                <div class="stat-value" id="totalApproved">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Payout</div>
                <div class="stat-value" id="pendingPayout">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Earned</div>
                <div class="stat-value" id="totalEarned">₹0</div>
            </div>
        </div>

        <!-- Payout Request Panel -->
        <div class="action-panel" id="payoutPanel">
            <h3>💰 Request salary payment</h3>
            <button class="request-btn" id="requestPayoutBtn">Request Payout</button>
        </div>

        <!-- Payment History -->
        <div class="history-card">
            <h2>📋 Payment History</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Payment ID</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsHistory"></tbody>
                </table>
            </div>
        </div>

        <footer>
            ⚡ All transactions secured · Servisphere
        </footer>
    </div>

    <script>
        (function() {
            const currentWorker = JSON.parse(localStorage.getItem('currentWorker'));
            if (!currentWorker) {
                window.location.href = 'login.html';
                return;
            }

            const workerId = currentWorker.id;
            const payments = JSON.parse(localStorage.getItem('payments') || '[]')
                .filter(p => p.workerId === workerId);

            // Calculate totals
            let totalApproved = 0;
            let pendingPayoutSum = 0;
            let totalEarned = 0;

            payments.forEach(p => {
                if (p.status === 'approved') {
                    totalApproved += p.amount;
                    totalEarned += p.amount;
                } else if (p.status === 'pending') {
                    pendingPayoutSum += p.amount;
                    totalEarned += p.amount; // earned but not yet approved
                } else if (p.status === 'paid_by_user') {
                    // This is waiting for special admin approval, so it's earned but not approved
                    totalEarned += p.amount;
                }
            });

            document.getElementById('totalApproved').innerText = `₹${totalApproved}`;
            document.getElementById('pendingPayout').innerText = `₹${pendingPayoutSum}`;
            document.getElementById('totalEarned').innerText = `₹${totalEarned}`;

            // Check if there is already a pending payout request
            // We'll implement a simple flag: if there's a payment of type 'payout' with status pending for this worker, disable button.
            const payoutRequests = JSON.parse(localStorage.getItem('payoutRequests') || '[]')
                .filter(r => r.workerId === workerId && r.status === 'pending');
            const requestBtn = document.getElementById('requestPayoutBtn');
            if (payoutRequests.length > 0) {
                requestBtn.disabled = true;
                requestBtn.innerText = 'Payout Request Pending';
            } else {
                requestBtn.disabled = false;
                requestBtn.innerText = 'Request Payout';
            }

            // Request payout action
            requestBtn.addEventListener('click', function() {
                if (totalApproved === 0) {
                    alert('No approved earnings to request payout.');
                    return;
                }
                // Create a payout request (separate collection)
                const payoutRequests = JSON.parse(localStorage.getItem('payoutRequests') || '[]');
                const newRequest = {
                    id: Date.now(),
                    workerId: workerId,
                    amount: totalApproved,
                    status: 'pending',
                    requestedAt: new Date().toISOString()
                };
                payoutRequests.push(newRequest);
                localStorage.setItem('payoutRequests', JSON.stringify(payoutRequests));
                alert('Payout request sent to special admin.');
                requestBtn.disabled = true;
                requestBtn.innerText = 'Request Sent';
            });

            // Populate payment history
            const tbody = document.getElementById('paymentsHistory');
            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No payment records yet</td></tr>';
            } else {
                tbody.innerHTML = payments.map(p => {
                    let badgeClass = 'badge';
                    if (p.status === 'approved') badgeClass += ' badge-approved';
                    else if (p.status === 'paid_by_user') badgeClass += ' badge-paid_by_user';
                    else if (p.status === 'pending') badgeClass += ' badge-pending';
                    return `
                        <tr>
                            <td>${p.id}</td>
                            <td>₹${p.amount}</td>
                            <td><span class="${badgeClass}">${p.status}</span></td>
                            <td>${p.createdAt ? new Date(p.createdAt).toLocaleDateString() : '—'}</td>
                        </tr>
                    `;
                }).join('');
            }

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('currentWorker');
                window.location.href = 'dashboard.html';
            });
        })();
    </script>
</body>
</html>
