<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login | Servisphere</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.4),
                0 0 60px rgba(255, 193, 7, 0.15);
            color: #ffd700;
            animation: fadeIn 0.8s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffd700;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.9);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        input::placeholder {
            color: rgba(255, 215, 0, 0.6);
        }

        input:focus {
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
            border-color: #ffd700;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            background: linear-gradient(135deg, #ffd700, #ffb300);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(255, 215, 0, 1);
        }

        button:active {
            transform: scale(0.96);
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
        }

        .back-link a {
            color: #ffeb99;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Admin Control Panel</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Admin Password" required>

            <button type="submit">Enter Dashboard</button>
        </form>

        <div class="back-link">
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Mock admin credentials
            if (email === 'admin@servisphere.com' && password === 'admin123') {
                localStorage.setItem(
                    'currentAdmin',
                    JSON.stringify({ email, role: 'admin' })
                );
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid admin credentials');
            }
        };
    </script>
</body>
</html>
