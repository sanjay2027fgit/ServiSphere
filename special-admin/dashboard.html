<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Admin · Payment Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: #0b0d10;
            color: #f0f0f0;
            padding: 30px 35px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #b71c1c;
            padding-bottom: 20px;
            box-shadow: 0 5px 20px rgba(200, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(145deg, #ffb0b0, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px #f33;
            letter-spacing: 1px;
        }

        .header p {
            color: #aa9f9f;
            font-size: 1rem;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid #b71c1c;
            color: #ff9f9f;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px #c0392b;
        }

        .logout-btn:hover {
            background: #b71c1c;
            color: #111;
            box-shadow: 0 0 30px #ff5e5e;
        }

        .metric-row {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .metric-card {
            background: #15181f;
            border: 1px solid #4a2a2a;
            border-radius: 24px;
            padding: 18px 25px;
            box-shadow: 0 0 18px #a13030;
            flex: 1 1 180px;
        }

        .metric-label {
            font-size: 0.9rem;
            color: #bdbdbd;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .metric-value {
            font-size: 2.6rem;
            font-weight: 700;
            color: #ffcfcf;
            text-shadow: 0 0 10px #ff5e5e;
        }

        .card {
            background: #13161c;
            border: 1px solid #632c2c;
            border-radius: 28px;
            padding: 25px;
            margin: 30px 0;
            box-shadow: 0 0 25px #8b1e1e;
        }

        .card h2 {
            font-size: 2rem;
            font-weight: 400;
            border-left: 6px solid #e63946;
            padding-left: 20px;
            margin-bottom: 25px;
            color: #ffdada;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            background: #1d2128;
            border: 1px solid #6b2f2f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #eaeef5;
        }

        th {
            background: #2c1c1c;
            color: #ffa7a7;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 16px 12px;
            border-bottom: 2px solid #b71c1c;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #3b2b2b;
            background: #1a1e25;
        }

        tr:hover td {
            background: #2b2222;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .badge-pending { background: #b45309; color: #fed7aa; box-shadow: 0 0 5px #f97316; }
        .badge-paid_by_user { background: #1e4b8a; color: #bfdbfe; box-shadow: 0 0 5px #3b82f6; }
        .badge-approved { background: #0b6e4f; color: #a7f3d0; box-shadow: 0 0 5px #10b981; }

        .approve-btn {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 8px #ff4444;
            transition: 0.2s;
        }
        .approve-btn:hover {
            background: #e63946;
            box-shadow: 0 0 18px #ff8888;
        }
        .approve-btn:disabled {
            background: #4a3a3a;
            box-shadow: none;
            cursor: not-allowed;
        }

        .empty-msg {
            color: #aaa;
            text-align: center;
            padding: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>💰 SPECIAL ADMIN</h1>
            <p>Payment release & transaction oversight</p>
        </div>
        <button class="logout-btn" id="logoutBtn">SIGN OUT</button>
    </div>

    <div class="metric-row">
        <div class="metric-card">
            <div class="metric-label">Pending release</div>
            <div class="metric-value" id="pendingReleaseCount">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Total approved</div>
            <div class="metric-value" id="totalApprovedCount">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Total revenue</div>
            <div class="metric-value" id="totalRevenue">₹0</div>
        </div>
    </div>

    <div class="card">
        <h2>⏳ Awaiting Admin Release (user paid)</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Payment ID</th>
                        <th>Booking ID</th>
                        <th>Worker</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="paymentsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000/api";

        (async function() {
            if (!localStorage.getItem('currentSpecialAdmin')) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const [paymentsRes, workersRes, usersRes] = await Promise.all([
                    fetch(API + "/payments/special-admin/pending"),
                    fetch(API + "/admin/workers"),
                    fetch(API + "/admin/users")
                ]);

                const [payments, workers, users] = await Promise.all([
                    paymentsRes.json(),
                    workersRes.json(),
                    usersRes.json()
                ]);

                const workersById = {};
                (workers || []).forEach(w => {
                    workersById[w.id] = w;
                });

                const usersById = {};
                (users || []).forEach(u => {
                    usersById[u.id] = u;
                });

                const pendingRelease = (payments || []).length;
                const totalRev = (payments || []).reduce(
                    (sum, p) => sum + (Number(p.amount) || 0),
                    0
                );

                document.getElementById('pendingReleaseCount').innerText = pendingRelease;
                document.getElementById('totalApprovedCount').innerText = "—";
                document.getElementById('totalRevenue').innerText = `₹${totalRev}`;

                const tbody = document.getElementById('paymentsBody');
                if (!payments || payments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No payments waiting for release</td></tr>';
                } else {
                    tbody.innerHTML = payments.map(p => {
                        const worker = workersById[p.worker_id];
                        const workerName = worker ? (worker.name || worker.email) : (p.worker_id || 'Unknown');
                        const user = usersById[p.user_id];
                        const userEmail = user ? user.email : (p.user_id || '—');
                        return `
                            <tr>
                                <td>${p.id}</td>
                                <td>${p.booking_id}</td>
                                <td>${workerName}</td>
                                <td>${userEmail}</td>
                                <td>₹${p.amount}</td>
                                <td><span class="badge badge-paid_by_user">${p.status}</span></td>
                                <td><button class="approve-btn" onclick="approvePayment(${p.id})">✓ Approve & Release</button></td>
                            </tr>
                        `;
                    }).join('');
                }

                window.approvePayment = async function(paymentId) {
                    try {
                        const res = await fetch(API + "/payments/" + paymentId + "/approve", {
                            method: "POST"
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            alert(data.message || "Failed to approve payment");
                            return;
                        }
                        alert('Payment approved and released to worker.');
                        window.location.reload();
                    } catch (err) {
                        alert("Server error");
                    }
                };
            } catch (err) {
                console.error(err);
                alert("Failed to load special admin data from server");
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('currentSpecialAdmin');
                window.location.href = '../index.html';
            });
        })();
    </script>
</body>
</html>
