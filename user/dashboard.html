<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard · Elite Gold & Silver</title>
    <!-- modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Emergency theme class (red/blue) */
        body.emergency-mode {
            background: radial-gradient(circle at 80% 10%, #2b0f0f, #0a0f2b 90%) !important;
        }
        body.emergency-mode .top-bar {
            border-color: #ff4d4d !important;
            box-shadow: 0 0 30px #ff000080, 0 0 0 1px #ff4d4d inset !important;
        }
        body.emergency-mode .logout-btn {
            border-color: #ff8888 !important;
            color: #ffcccc !important;
            box-shadow: 0 0 15px #ff4d4d !important;
        }
        body.emergency-mode .logout-btn:hover {
            background: #ff4d4d !important;
            color: #0a0f2b !important;
            border-color: #ffb3b3 !important;
        }
        body.emergency-mode .premium-btn,
        body.emergency-mode .more-btn,
        body.emergency-mode .book-now-btn,
        body.emergency-mode button {
            background: linear-gradient(145deg, #4d1a1a, #1a1a4d) !important;
            border-color: #ff6666 !important;
            color: #ffe6e6 !important;
            box-shadow: 0 0 20px #ff3333 !important;
        }
        body.emergency-mode .premium-btn:hover,
        body.emergency-mode .more-btn:hover,
        body.emergency-mode .book-now-btn:hover,
        body.emergency-mode button:hover {
            background: #ff4d4d !important;
            color: #0a0f2b !important;
            border-color: #ffb3b3 !important;
            box-shadow: 0 0 30px #ff6666 !important;
        }
        body.emergency-mode .card {
            border-color: #ff6666 !important;
            box-shadow: 0 20px 40px -12px #330000, 0 0 0 1px #ff6666 inset !important;
        }
        body.emergency-mode .card h3 {
            background: linear-gradient(135deg, #ffb3b3, #b3b3ff) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            color: transparent !important;
        }
        body.emergency-mode .worker-card,
        body.emergency-mode .booking-card {
            border-color: #ff8888 !important;
        }
        body.emergency-mode .icon-wrapper {
            background: #4d1a1a !important;
            border-color: #ff6666 !important;
            color: #ffb3b3 !important;
        }
        body.emergency-mode .service-card:hover .icon-wrapper {
            background: #ff4d4d !important;
            color: #0a0f2b !important;
        }
        body.emergency-mode #userName {
            background: linear-gradient(145deg, #ffb3b3, #b3b3ff) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
        }
        /* Emergency button */
        #emergencyBtn {
            background: #cc0000;
            border: 2px solid #ff9999;
            color: white;
            font-weight: 700;
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0000;
            transition: 0.2s;
            font-size: 1rem;
            letter-spacing: 0.5px;
            margin-right: 1rem;
        }
        #emergencyBtn:hover {
            background: #ff4d4d;
            box-shadow: 0 0 30px #ff6666;
            transform: scale(1.02);
        }
        body.emergency-mode #emergencyBtn {
            background: #004d99;
            border-color: #99ccff;
            box-shadow: 0 0 20px #0066ff;
        }
        body.emergency-mode #emergencyBtn:hover {
            background: #0066cc;
        }

        /* Base styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 80% 10%, #2b2b20, #0a0a0f 90%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #ede7d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 12, 18, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 4rem;
            padding: 0.9rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px -10px #000, 0 0 0 1px rgba(255, 215, 0, 0.2) inset, 0 0 20px #ffd70020;
        }

        #userInfo {
            font-size: 1.2rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #userName {
            font-weight: 600;
            background: linear-gradient(145deg, #f5e7b2, #ffdb7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #ffd700;
        }

        #userEmail {
            font-size: 0.95rem;
            opacity: 0.8;
            color: #d6c48a;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid #c0a65a;
            color: #f3e3b5;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 12px #b49450, 0 4px 12px black;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            background: #dbb35c;
            color: #0a0804;
            border-color: #ffea9e;
            box-shadow: 0 0 25px #ffbf00, 0 6px 14px black;
            transform: scale(1.02);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(18, 18, 24, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid #a89058;
            color: #f5e7c8;
            font-weight: 600;
            padding: 0.8rem 2.5rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 15px #927f40;
            transition: 0.2s;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn.active {
            background: #dbb35c;
            color: #0a0804;
            border-color: #ffea9e;
            box-shadow: 0 0 30px #ffbf00;
        }
        .tab-btn:hover {
            background: #c9a459;
            color: #0a0701;
            border-color: #ffd877;
            box-shadow: 0 0 25px #fcb42e;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Services grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-bottom: 1rem;
        }
        .service-card {
            background: rgba(18, 18, 24, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 40px -12px black, 0 0 0 1px rgba(255, 215, 0, 0.2) inset;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .service-card:hover {
            border-color: #f5cb5c;
            box-shadow: 0 0 30px #ffd70040, 0 0 0 1px #ffd966 inset;
            transform: translateY(-6px);
        }
        .icon-wrapper {
            background: #3a311e;
            width: 64px;
            height: 64px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #ffdb7c;
            margin-bottom: 1.5rem;
            border: 1px solid #d4a13e;
        }
        .service-card:hover .icon-wrapper {
            background: #c9a459;
            color: #0a0804;
        }
        .service-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #fff2cf;
        }
        .service-desc {
            color: #c4b28c;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.8rem;
            flex: 1;
        }
        .book-now-btn {
            background: linear-gradient(145deg, #2f2819, #1e1a10);
            border: 2px solid #a5874b;
            color: #f7e3b6;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 12px #8b763a;
            transition: 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .book-now-btn:hover {
            background: #c9a459;
            border-color: #ffd877;
            color: #0a0701;
            box-shadow: 0 0 25px #fcb42e;
        }

        .service-card.extra-service.hidden-service {
            display: none;
        }
        .more-btn-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0 2rem;
        }
        .more-btn {
            background: transparent;
            border: 2px solid #a89058;
            color: #f5e7c8;
            font-weight: 600;
            padding: 0.8rem 3rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 15px #927f40;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            font-size: 1rem;
        }
        .more-btn:hover {
            background: #dbb35c;
            color: #0a0804;
            border-color: #ffea9e;
            box-shadow: 0 0 30px #ffbf00;
        }

        /* Cards */
        .card {
            background: rgba(18, 18, 24, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 40px -12px black, 0 0 0 1px rgba(255, 215, 0, 0.2) inset, 0 0 30px #ffd70015;
            animation: goldPulse 6s infinite ease-in-out;
        }

        .card h3 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff2cf, #e0c06b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #aa8e4e60;
            padding-bottom: 0.8rem;
        }

        .worker-card, .booking-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #b4944c;
            border-radius: 2rem;
            padding: 1.4rem 1.6rem;
            margin: 1rem 0;
            box-shadow: 0 8px 20px -5px #000, 0 0 0 1px #ddb760 inset;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .worker-card:hover, .booking-card:hover {
            border-color: #f5cb5c;
            box-shadow: 0 12px 28px -8px black, 0 0 0 1px #ffd966 inset, 0 0 25px #ffbe2e;
        }

        .worker-card strong, .booking-card strong {
            color: #ffdf9e;
            font-weight: 600;
            text-shadow: 0 0 4px #daa520;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.6);
            border: 1px solid;
            backdrop-filter: blur(2px);
        }

        .badge-pending {
            background: #3a311e;
            border-color: #d4a13e;
            color: #ffd966;
            box-shadow: 0 0 10px #ffb700;
        }

        .badge-paid {
            background: #1b4030;
            border-color: #58b987;
            color: #b7ebc2;
            box-shadow: 0 0 8px #2ecc71;
        }

        .badge-completed {
            background: #1e334d;
            border-color: #6d94c0;
            color: #b3d9ff;
            box-shadow: 0 0 8px #3f9eff;
        }

        .feedback-form {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(20, 18, 12, 0.7);
            border-radius: 1.5rem;
            border: 1px solid #997f44;
        }

        select, textarea {
            background: rgba(10, 8, 5, 0.8);
            border: 1px solid #b4944c;
            border-radius: 2rem;
            padding: 0.7rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #f5ddb1;
            width: 100%;
            margin: 0.5rem 0 1rem;
            outline: none;
            box-shadow: 0 0 8px #66561e, inset 0 2px 6px black;
            transition: 0.2s;
        }

        select:focus, textarea:focus {
            border-color: #ffcf5a;
            box-shadow: 0 0 15px #ffbe2e, inset 0 2px 8px black;
            background: #1f1a0e;
        }

        button, .btn {
            background: linear-gradient(145deg, #2f2819, #1e1a10);
            border: 2px solid #a5874b;
            color: #f7e3b6;
            font-weight: 600;
            padding: 0.6rem 1.6rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 0 12px #8b763a, 0 4px 8px black;
            transition: 0.2s;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            margin: 0.25rem 0.5rem 0.25rem 0;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button:hover, .btn:hover {
            background: #c9a459;
            border-color: #ffd877;
            color: #0a0701;
            box-shadow: 0 0 25px #fcb42e, 0 6px 12px black;
            transform: scale(1.02);
        }

        .filter-hint {
            color: #ffdb7c;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-style: italic;
        }
        .clear-filter {
            margin-left: 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            color: #ffd966;
            text-decoration: underline;
        }

        @keyframes goldPulse {
            0% { border-color: rgba(212, 175, 55, 0.4); }
            50% { border-color: rgba(255, 215, 0, 0.9); box-shadow: 0 0 30px #ffd70040; }
            100% { border-color: rgba(212, 175, 55, 0.4); }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- top bar with user & logout & emergency button -->
    <div class="top-bar">
        <div id="userInfo">
            👤
            <span>Logged in as:</span>
            <strong id="userName"></strong>
            <span id="userEmail" style="font-size:0.95rem; opacity:0.8;"></span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button id="emergencyBtn"><i class="fa-solid fa-exclamation-triangle"></i> EMERGENCY MODE</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Tabs navigation (now four tabs) -->
    <div class="tabs">
        <button class="tab-btn active" id="tabServices"><i class="fa-regular fa-grid-2"></i> Services</button>
        <button class="tab-btn" id="tabWorkers"><i class="fa-solid fa-briefcase"></i> Workers</button>
        <button class="tab-btn" id="tabBookings"><i class="fa-regular fa-calendar"></i> My Bookings</button>
        <button class="tab-btn" id="tabCompleted"><i class="fa-solid fa-circle-check"></i> Completed Jobs</button>
    </div>

    <!-- Tab contents -->
    <div id="servicesTab" class="tab-content active">
        <div class="services-grid" id="servicesGrid"></div>
        <div class="more-btn-container">
            <button class="more-btn" id="toggleMoreBtn"><i class="fa-regular fa-circle-plus"></i> More Services <i class="fa-regular fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="workersTab" class="tab-content">
        <div id="filterHint" class="filter-hint"></div>
        <div id="workersList"></div>
    </div>

    <div id="bookingsTab" class="tab-content">
        <div id="bookingsList"></div>
    </div>

    <div id="completedTab" class="tab-content">
        <div id="completedJobs"></div>
    </div>
</div>

<script>
    (function() {
        const API = "http://localhost:5000/api";
        // ---------- EMERGENCY MODE TOGGLE ----------
        const emergencyBtn = document.getElementById('emergencyBtn');
        emergencyBtn.addEventListener('click', () => {
            document.body.classList.toggle('emergency-mode');
            if (document.body.classList.contains('emergency-mode')) {
                emergencyBtn.innerHTML = '<i class="fa-solid fa-shield"></i> NORMAL MODE';
            } else {
                emergencyBtn.innerHTML = '<i class="fa-solid fa-exclamation-triangle"></i> EMERGENCY MODE';
            }
        });

        // ---------- AUTH & USER INFO ----------
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }

        // Workers will now be loaded from Supabase, not seeded locally
        let workers = [];

        document.getElementById('userName').innerText = currentUser.name || currentUser.email;
        document.getElementById('userEmail').innerText = currentUser.email ? `(${currentUser.email})` : '';

        // ---------- SERVICES DATA (expanded: 18 services) ----------
        const services = [
            { id: 1, name: 'Plumber', icon: 'fa-solid fa-wrench', desc: 'Tap repair, pipe leakage, bathroom fitting.' },
            { id: 2, name: 'Electrician', icon: 'fa-solid fa-bolt', desc: 'Wiring, switchboard, circuit breaker.' },
            { id: 3, name: 'AC Mechanic', icon: 'fa-regular fa-snowflake', desc: 'Gas refill, cooling issues, split AC.' },
            { id: 4, name: 'Bike Mechanic', icon: 'fa-solid fa-motorcycle', desc: 'Engine check, puncture, maintenance.' },
            { id: 5, name: 'Carpenter', icon: 'fa-solid fa-hammer', desc: 'Furniture repair, door/window fitting.' },
            { id: 6, name: 'House Cleaning', icon: 'fa-solid fa-broom', desc: 'Deep cleaning, kitchen & bathroom.' },
            { id: 7, name: 'Painter', icon: 'fa-solid fa-paint-roller', desc: 'Wall painting, texture, putty.' },
            { id: 8, name: 'Refrigerator Repair', icon: 'fa-solid fa-temperature-low', desc: 'Cooling issues, gas leak.' },
            { id: 9, name: 'Washing Machine Repair', icon: 'fa-solid fa-soap', desc: 'Not spinning, leakage, drain.' },
            { id: 10, name: 'RO Water Purifier', icon: 'fa-solid fa-droplet', desc: 'Filter change, tank cleaning.' },
            { id: 11, name: 'Tutor', icon: 'fa-solid fa-chalkboard-user', desc: 'Home tutoring for all subjects.' },
            { id: 12, name: 'Chef', icon: 'fa-solid fa-utensils', desc: 'Private chef for events or daily meals.' },
            { id: 13, name: 'Gardener', icon: 'fa-solid fa-leaf', desc: 'Lawn mowing, plant care, landscaping.' },
            { id: 14, name: 'Acting Driver', icon: 'fa-solid fa-car', desc: 'Professional driver for your vehicle.' },
            { id: 15, name: 'Masseur', icon: 'fa-solid fa-hand-sparkles', desc: 'Therapeutic massage at home.' },
            { id: 16, name: 'Beautician', icon: 'fa-solid fa-spa', desc: 'Salon services: facial, waxing, makeup.' },
            { id: 17, name: 'Delivery Partner', icon: 'fa-solid fa-truck', desc: 'Parcel pickup and dropoff.' },
            { id: 18, name: 'Load Man', icon: 'fa-solid fa-dolly', desc: 'Loading/unloading, shifting help.' }
        ];

        // ---------- TAB SWITCHING ----------
        const tabServices = document.getElementById('tabServices');
        const tabWorkers = document.getElementById('tabWorkers');
        const tabBookings = document.getElementById('tabBookings');
        const tabCompleted = document.getElementById('tabCompleted');
        const servicesTab = document.getElementById('servicesTab');
        const workersTab = document.getElementById('workersTab');
        const bookingsTab = document.getElementById('bookingsTab');
        const completedTab = document.getElementById('completedTab');

        function setActiveTab(tabId) {
            [tabServices, tabWorkers, tabBookings, tabCompleted].forEach(btn => btn.classList.remove('active'));
            [servicesTab, workersTab, bookingsTab, completedTab].forEach(tab => tab.classList.remove('active'));

            if (tabId === 'services') {
                tabServices.classList.add('active');
                servicesTab.classList.add('active');
                renderServicesTab();
            } else if (tabId === 'workers') {
                tabWorkers.classList.add('active');
                workersTab.classList.add('active');
                renderWorkersTab(currentServiceFilter);
            } else if (tabId === 'bookings') {
                tabBookings.classList.add('active');
                bookingsTab.classList.add('active');
                renderBookingsTab();
            } else if (tabId === 'completed') {
                tabCompleted.classList.add('active');
                completedTab.classList.add('active');
                renderCompletedJobs();
            }
        }

        tabServices.addEventListener('click', () => setActiveTab('services'));
        tabWorkers.addEventListener('click', () => setActiveTab('workers'));
        tabBookings.addEventListener('click', () => setActiveTab('bookings'));
        tabCompleted.addEventListener('click', () => setActiveTab('completed'));

        // ---------- SERVICES TAB RENDERING ----------
        function renderServicesTab() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';
            services.forEach((s, idx) => {
                const card = document.createElement('div');
                card.className = 'service-card';
                if (idx >= 8) {
                    card.classList.add('extra-service');
                    if (!showingAll) card.classList.add('hidden-service');
                }
                card.innerHTML = `
                    <div class="icon-wrapper"><i class="${s.icon}"></i></div>
                    <div class="service-name">${s.name}</div>
                    <div class="service-desc">${s.desc}</div>
                    <button class="book-now-btn" data-service="${s.name}"><i class="fa-regular fa-calendar-plus"></i> Book Now</button>
                `;
                grid.appendChild(card);
            });
        }

        let showingAll = false;
        document.getElementById('toggleMoreBtn').addEventListener('click', () => {
            showingAll = !showingAll;
            document.querySelectorAll('.extra-service').forEach(c => c.classList.toggle('hidden-service', !showingAll));
            const btn = document.getElementById('toggleMoreBtn');
            btn.innerHTML = showingAll ?
                '<i class="fa-regular fa-circle-minus"></i> Show fewer services <i class="fa-regular fa-arrow-up"></i>' :
                '<i class="fa-regular fa-circle-plus"></i> More Services <i class="fa-regular fa-arrow-right"></i>';
        });

        // ---------- WORKERS TAB WITH FILTER ----------
        let currentServiceFilter = null;

        function renderWorkersTab(roleFilter = null) {
            const workersDiv = document.getElementById('workersList');
            const filterHint = document.getElementById('filterHint');
            let filtered = workers;

            if (roleFilter && workers.length > 0) {
                // we don't yet store per-service roles in Supabase; just show all workers
                filterHint.innerHTML = `Showing workers for <strong>${roleFilter}</strong> (all available workers listed)`;
            } else {
                filterHint.innerHTML = 'All available workers';
            }

            if (filtered.length === 0) {
                workersDiv.innerHTML = '<p style="padding:1rem;">No workers found for this service.</p>';
                return;
            }

            workersDiv.innerHTML = filtered.map(w => `
                <div class="worker-card">
                    <strong>${w.name || w.email}</strong> - Worker<br>
                    <a href="booking-form.html?workerId=${w.id}" class="btn">Book</a>
                </div>
            `).join('');

            const clearEl = document.getElementById('clearFilter');
            if (clearEl) {
                clearEl.addEventListener('click', () => {
                    currentServiceFilter = null;
                    renderWorkersTab();
                });
            }
        }

        // Handle service "Book Now" clicks – switch to workers tab and filter
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.book-now-btn');
            if (!btn) return;
            const serviceName = btn.dataset.service;
            if (serviceName) {
                currentServiceFilter = serviceName;
                setActiveTab('workers');
            }
        });

        // ---------- MY BOOKINGS TAB RENDERING ----------
        async function renderBookingsTab() {
            const bookingsDiv = document.getElementById('bookingsList');
            try {
                const res = await fetch(API + "/bookings/user/" + currentUser.id);
                const bookings = await res.json();
                if (!res.ok) {
                    bookingsDiv.innerHTML = '<p>Failed to load bookings.</p>';
                    return;
                }
                if (!bookings || bookings.length === 0) {
                    bookingsDiv.innerHTML = '<p>No bookings yet.</p>';
                    return;
                }

                bookingsDiv.innerHTML = bookings.map(b => {
                    let statusClass = '';
                    if (b.status === 'pending') statusClass = 'badge-pending';
                    else if (b.status === 'completed') statusClass = 'badge-completed';
                    else if (b.status === 'in_progress') statusClass = 'badge-paid';
                    let action = '';
                    if (b.status === 'accepted' || b.status === 'on_the_way' || b.status === 'near' || b.status === 'arrived') {
                        action = `<a href="track.html?bookingId=${b.id}"><button>Track</button></a>`;
                    }
                    let otpButton = '';
                    let otpDisplay = '';
                    if (b.status === 'arrived') {
                        if (!b.otp) {
                            otpButton = `<button onclick="generateOtp(${b.id})">Generate OTP</button>`;
                        } else {
                            otpDisplay = `<p><strong>OTP:</strong> ${b.otp}</p>`;
                        }
                    }
                    return `
                        <div class="booking-card">
                            <strong>ID:</strong> ${b.id}<br>
                            <strong>Worker:</strong> ${b.worker_id}<br>
                            <strong>Status:</strong> <span class="badge ${statusClass}">${b.status}</span><br>
                            ${otpDisplay}
                            ${action} ${otpButton}
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Bookings load error", err);
                bookingsDiv.innerHTML = '<p>Failed to load bookings.</p>';
            }
        }

        // ---------- COMPLETED JOBS TAB RENDERING ----------
        async function renderCompletedJobs() {
            const completedDiv = document.getElementById('completedJobs');
            try {
                const [bookingsRes, paymentsRes, feedbackRes] = await Promise.all([
                    fetch(API + "/bookings/user/" + currentUser.id),
                    fetch(API + "/admin/payments"),
                    fetch(API + "/admin/feedback")
                ]);
                const [allBookings, allPayments, allFeedbacks] = await Promise.all([
                    bookingsRes.json(),
                    paymentsRes.json(),
                    feedbackRes.json()
                ]);

                const bookings = (allBookings || []).filter(b => b.status === 'completed');
                const payments = (allPayments || []).filter(p => p.user_id === currentUser.id);
                const feedbacks = (allFeedbacks || []).filter(f => f.user_id === currentUser.id);

                function getPaymentForBooking(bookingId) {
                    return payments.find(p => p.booking_id === bookingId);
                }

                function feedbackExists(bookingId) {
                    return feedbacks.some(f => f.booking_id === bookingId);
                }

                if (bookings.length === 0) {
                    completedDiv.innerHTML = '<p style="padding:1rem;">No completed jobs yet.</p>';
                    return;
                }

                completedDiv.innerHTML = bookings.map(b => {
                    const payment = getPaymentForBooking(b.id);
                    const alreadyFeedback = feedbackExists(b.id);

                    let actionsHtml = '';

                    if (payment) {
                        if (payment.status === 'pending') {
                            actionsHtml += `
                                <div style="margin:10px 0;">
                                    <p><strong>Payment required:</strong> ₹${payment.amount}</p>
                                </div>
                            `;
                        } else if (payment.status === 'paid_by_user') {
                            actionsHtml += `<p><span class="badge badge-paid">Payment completed (awaiting admin release)</span></p>`;
                        } else if (payment.status === 'approved') {
                            actionsHtml += `<p><span class="badge badge-paid">Payment released to worker</span></p>`;
                        }
                    }

                    if (!alreadyFeedback) {
                        actionsHtml += `
                            <div class="feedback-form" id="feedback-${b.id}">
                                <p><strong>Leave feedback:</strong></p>
                                <select id="rating-${b.id}" class="rating-select">
                                    <option value="5">5 - Excellent</option>
                                    <option value="4">4 - Good</option>
                                    <option value="3">3 - Average</option>
                                    <option value="2">2 - Poor</option>
                                    <option value="1">1 - Terrible</option>
                                </select>
                                <textarea id="comment-${b.id}" placeholder="Write your feedback (optional)" rows="2"></textarea>
                                <button class="feedback-btn" data-bookingid="${b.id}">⭐ Submit Feedback</button>
                            </div>
                        `;
                    } else {
                        actionsHtml += `<p><span class="badge badge-completed">Feedback already submitted</span></p>`;
                    }

                    return `
                        <div class="booking-card" id="booking-${b.id}">
                            <strong>Job ID:</strong> ${b.id}<br>
                            <strong>Worker:</strong> ${b.worker_id}<br>
                            ${actionsHtml}
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.feedback-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const bookingId = parseInt(this.dataset.bookingid);
                        const rating = document.getElementById(`rating-${bookingId}`).value;
                        const comment = document.getElementById(`comment-${bookingId}`).value;
                        try {
                            const res = await fetch(API + "/feedback", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    booking_id: bookingId,
                                    user_id: currentUser.id,
                                    rating: parseInt(rating),
                                    comment
                                })
                            });
                            const data = await res.json();
                            if (!res.ok) {
                                alert(data.message || "Failed to submit feedback");
                                return;
                            }
                            alert('Feedback submitted. Thank you!');
                            renderCompletedJobs();
                        } catch (err) {
                            alert("Server error");
                        }
                    });
                });
            } catch (err) {
                console.error("Completed jobs load error", err);
                completedDiv.innerHTML = '<p style="padding:1rem;">Failed to load completed jobs.</p>';
            }
        }

        async function loadWorkersFromApi() {
            try {
                const res = await fetch(API + "/admin/workers");
                if (!res.ok) {
                    console.error("Failed to load workers from API");
                    return;
                }
                workers = await res.json();
                renderWorkersTab(currentServiceFilter);
            } catch (err) {
                console.error("Workers API error", err);
            }
        }

        // ---------- INITIAL RENDER ----------
        renderServicesTab();
        loadWorkersFromApi(); // show only workers from Supabase
        renderBookingsTab();
        renderCompletedJobs();

        // ---------- GLOBAL FUNCTIONS (OTP, logout) ----------
        window.generateOtp = function(bookingId) {
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const index = bookings.findIndex(b => b.id === bookingId);
            if (index !== -1 && bookings[index].status === 'arrived') {
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                bookings[index].otp = otp;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                alert(`OTP generated: ${otp}. Share this with the worker.`);
                window.location.reload();
            }
        };

        window.logout = function() {
            localStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        };
    })();
</script>
</body>
</html>
